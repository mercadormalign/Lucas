<h1>Você acha que o HTML é dificil?</h1>

<button onclick="alert('Que bom que está achando fácil!')">Não</button>

<button id="botaoFujao" onclick="fogeFoge()">Sim</button>

<script>
    function fogeFoge() {

        let botao = document.getElementById("botaoFujao");
    
        botao.style.position = "absolute" ;    
        
        let posicaoTopo = Math.random() *80;
        botao.style.top = posicaoTopo + "%";

        let posicaoEsquerda = Math.random() * 80;
        botao.style.left = posicaoEsquerda + "%";
        }
</script>
